<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EJ Gandia</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="shortcut icon" type="image/x-icon" href="ejfaviconblue.png">
</head>
<body>

<!-- TOPNAV -->
<header class="topnav">
  <nav class="nav-left">
    <a href="#about">About</a>
  </nav>

  <div class="nav-center">
    <a href="index.html" class="logo-link">
      <img src="images/logo.png" class="logo">
    </a>
  </div>

  <nav class="nav-right">
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- MAIN GRID -->
<main class="main">

<section class="hero">
  <div class="hero-grid">

    <!-- LEFT: TEXT -->
    <div class="hero-text">
 <h1>
  <span class="hero-name">EJ Gandia</span> graphic designer crafting modern,

</h1>

      <p>
        Focused on visual storytelling, branding, and thoughtful design systems

      </p>
    </div>

    <!-- RIGHT: IMAGE -->

      <img src="images/profile.jpg" alt="EJ Gandia portrait">

  </div>
</section> <!-- END HERO -->

<section class="categories">

  <div class="category">
    <div class="category-img">
      <img src="images/process.jpg" alt="Print work">
    </div>

  </div>

  <div class="category">
    <div class="category-img">
      <img src="images/process.jpg" alt="Digital work">
    </div>
    <h2>Digital</h2>
  </div>

  <div class="category">
    <div class="category-img">
      <img src="images/process.jpg" alt="Branding work">
    </div>
    <h2>Branding</h2>
  </div>

</section>
  

</div>
